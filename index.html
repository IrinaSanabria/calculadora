<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Insulina</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Forum&family=Questrial&display=swap" rel="stylesheet">

<style>

/* ==============================
   COLORES
============================== */

:root{
--bg:#f4ede6;
--card:#fffaf4;
--primary:#8b6f54;
--accent:#b79b7f;
--text:#4a3a2a;
--shadow:0 10px 24px rgba(0,0,0,0.08);
}

/* ==============================
   BASE
============================== */

body{
margin:0;
background:var(--bg);
font-family:'Questrial',sans-serif;
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.container{
width:92%;
max-width:420px;
}

/* ==============================
   TITULO
============================== */

h1{
font-family:'Forum',serif;
text-align:center;
font-size:30px;
margin-bottom:20px;
color:var(--primary);
}

/* ==============================
   CARD
============================== */

.card{
background:var(--card);
border-radius:22px;
padding:24px;
box-shadow:var(--shadow);
}

/* ==============================
   INPUTS
============================== */

.field{
margin-bottom:16px;
}

label{
font-size:14px;
display:block;
margin-bottom:6px;
color:var(--primary);
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#f1e8df;
font-size:16px;
outline:none;
}

/* ==============================
   BOTON
============================== */

button{
width:100%;
margin-top:10px;
padding:16px;
border:none;
border-radius:18px;
font-size:16px;
background:var(--primary);
color:white;
cursor:pointer;
font-family:'Questrial',sans-serif;
}

/* ==============================
   RESULTADO
============================== */

.result{
margin-top:22px;
background:#f8f1ea;
padding:18px;
border-radius:18px;
font-size:15px;
line-height:1.6;
display:none;
}

.result b{
color:#5e4632;
}

/* ==============================
   FOOTER
============================== */

footer{
text-align:center;
margin-top:18px;
font-size:12px;
color:#7b5f46;
}

</style>
</head>

<body>

<div class="container">

<h1>Calculadora de Insulina🤎💉</h1>

<div class="card">

<div class="field">
<label>Glucosa actual (mg/dL)</label>
<input id="glucose" type="number" inputmode="decimal">
</div>

<div class="field">
<label>Carbohidratos (g)</label>
<input id="carbs" type="number" step="0.1" inputmode="decimal">
</div>

<div class="field">
<label>Grasas (g)</label>
<input id="fat" type="number" step="0.1" inputmode="decimal">
</div>

<div class="field">
<label>Proteínas (g)</label>
<input id="protein" type="number" step="0.1" inputmode="decimal">
</div>

<button onclick="calculate()">Calcular</button>

<div id="result" class="result"></div>

</div>

<footer>
de mi para mi 🤎<br>
ⒾⓅⓈ
</footer>

</div>

<script>

/* ==============================
CONFIGURACIÓN
============================== */

const target = 90;
const correctionFactor = 40;
const fatThreshold = 20;

/* ==============================
RATIO SEGÚN HORA
============================== */

function getRatio(){

const hour = new Date().getHours();

if(hour >=7 && hour <10) return 6;
if(hour >=12 && hour <15) return 7;
if(hour >=18 && hour <22) return 7;

return 7;

}

/* ==============================
PREBOLUS
============================== */

function getPrebolus(glucose){

if(glucose >=90 && glucose <=120) return "10 min";
if(glucose >120 && glucose <=180) return "15 min";
if(glucose >180 && glucose <=220) return "20 min";
if(glucose >220) return "25 min";

return "0 min";

}

/* ==============================
FORMATEAR HORA
============================== */

function formatTime(date){

const h = date.getHours().toString().padStart(2,"0");
const m = date.getMinutes().toString().padStart(2,"0");

return `${h}:${m}`;

}

/* ==============================
CALCULO PRINCIPAL
============================== */

function calculate(){

const glucose = parseFloat(document.getElementById("glucose").value) || 0;
const carbs = parseFloat(document.getElementById("carbs").value) || 0;
const fat = parseFloat(document.getElementById("fat").value) || 0;
const protein = parseFloat(document.getElementById("protein").value) || 0;

const ratio = getRatio();

/* Insulina por carbohidratos */

let insulinCarbs = carbs / ratio;

/* Estimación simple FPU */

const caloriesFat = fat * 9;
const caloriesProtein = protein * 4;
const fpu = (caloriesFat + caloriesProtein)/100;
const fpuInsulin = fpu * 0.5;

insulinCarbs += fpuInsulin;

/* Corrección */

let correction = 0;

if(glucose > target){
correction = (glucose - target) / correctionFactor;
}

/* Dosis total */

const total = insulinCarbs + correction;

/* Prebolus */

const prebolus = getPrebolus(glucose);

/* Mensajes */

let message = "";

/* Hipoglucemia */

if(glucose < 70){

const neededCarbs = ((target - glucose)/correctionFactor) * ratio;

message += `⚠️ <b>Glucosa baja.</b><br>
Consumir aproximadamente <b>${neededCarbs.toFixed(1)} g</b> de carbohidratos antes de aplicar insulina.<br><br>`;

}

/* Glucosa alta */

if(glucose > 250){

message += `⚠️ <b>Glucosa muy alta.</b><br>
Considerar aplicar corrección y esperar antes de comenzar a comer.<br><br>`;

}

/* Resultado base */

let resultHTML = `
<b>🍞 Insulina por carbohidratos:</b> ${insulinCarbs.toFixed(2)} U<br>
<b>🩸 Corrección:</b> ${correction.toFixed(2)} U<br>
<b>💉 Dosis total:</b> ${total.toFixed(2)} U<br>
<b>⏱️ Pre-bolus recomendado:</b> ${prebolus}<br>
`;

/* Comida alta en grasa */

if(fat >= fatThreshold){

const nowDose = total * 0.7;
const laterDose = total * 0.3;

const laterTime = new Date(Date.now() + 90*60000);

resultHTML += `
<br>
<b>🥑 Comida alta en grasa</b><br>
<b>💉 Aplicar ahora:</b> ${nowDose.toFixed(2)} U<br>
<b>💉 Bolo extra:</b> ${laterDose.toFixed(2)} U a las ${formatTime(laterTime)}<br>
`;

}else{

resultHTML += `
<br>
<b>💉 Aplicar ahora:</b> ${total.toFixed(2)} U
`;

}

/* Mostrar resultado */

const resultBox = document.getElementById("result");

resultBox.innerHTML = message + resultHTML;
resultBox.style.display = "block";

/* Vibración suave iPhone */

if(navigator.vibrate){
navigator.vibrate(20);
}

}

</script>

</body>
</html>
