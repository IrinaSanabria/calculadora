<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora🤎</title>

<link href="https://fonts.googleapis.com/css2?family=Questrial&family=Forum&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #f5efe6;
    font-family: 'Questrial', sans-serif;
    display: flex;
    justify-content: center;
}

.app {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: #fffaf3;
    padding: 20px;
    box-sizing: border-box;
}

h1 {
    font-family: 'Forum', serif;
    text-align: center;
    font-size: 28px;
    margin-bottom: 25px;
    color: #5c4033;
}

label {
    font-size: 14px;
    margin-top: 12px;
    display: block;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #d8cfc4;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: none;
    background-color: #8b6f47;
    color: white;
    font-size: 16px;
    font-weight: bold;
}

button:active {
    background-color: #6b4f4f;
}

.results {
    margin-top: 25px;
    padding: 15px;
    border-radius: 15px;
    background: #f1e6d6;
    font-size: 15px;
}

.warning {
    color: #a94442;
    margin-top: 10px;
}

.footer {
    text-align: center;
    margin-top: 40px;
    font-family: 'Forum', serif;
    color: #6b4f4f;
}

.signature {
    margin-top: 5px;
    letter-spacing: 4px;
}
</style>
</head>

<body>

<div class="app">

<h1>Calculadora 🤎💉</h1>

<label>Glucosa actual (mg/dL)</label>
<input type="number" inputmode="decimal" id="glucose">

<label>Carbohidratos (g)</label>
<input type="number" step="0.1" inputmode="decimal" id="carbs">

<label>Grasas (g)</label>
<input type="number" step="0.1" inputmode="decimal" id="fat">

<label>Proteínas (g)</label>
<input type="number" step="0.1" inputmode="decimal" id="protein">

<label>Último bolo (unidades)</label>
<input type="number" step="0.1" inputmode="decimal" id="lastBolus">

<label>Tiempo desde último bolo</label>
<input type="time" id="timeBolus">

<button onclick="calcular()">Calcular dosis 🤎</button>

<div class="results" id="results"></div>

<div class="footer">
    <div>de mi para mi 🤎</div>
    <div class="signature">ⒾⓅⓈ</div>
</div>

</div>

<script>
const ISF = 40;
const ICR = 10;
const DIA = 4;
const TARGET = 90;

function roundHalf(num) {
    return Math.round(num * 2) / 2;
}

function calcularCorreccion(glucose) {
    if (glucose < 70) return 0;
    if (glucose <= TARGET) return 0;
    return (glucose - TARGET) / ISF;
}

function calcularCarbsNecesarios(glucose) {
    if (glucose >= 70) return 0;
    return ((TARGET - glucose) / ISF) * ICR;
}

function calcularComida(carbs) {
    return carbs / ICR;
}

function calcularFPU(fat, protein) {
    let calories = (fat * 9) + (protein * 4);
    let FPU = calories / 100;
    let unidadesTeoricas = (FPU * 10) / ICR;
    return unidadesTeoricas * 0.5;
}

function calcularIOB(lastBolus, hoursElapsed) {
    if (hoursElapsed >= DIA) return 0;
    return lastBolus * Math.pow((1 - (hoursElapsed / DIA)), 2);
}

function calcular() {
    let glucose = parseFloat(document.getElementById("glucose").value) || 0;
    let carbs = parseFloat(document.getElementById("carbs").value) || 0;
    let fat = parseFloat(document.getElementById("fat").value) || 0;
    let protein = parseFloat(document.getElementById("protein").value) || 0;
    let lastBolus = parseFloat(document.getElementById("lastBolus").value) || 0;

    let timeInput = document.getElementById("timeBolus").value;
    let hoursElapsed = 0;

    if (timeInput) {
        let parts = timeInput.split(":");
        hoursElapsed = parseInt(parts[0]) + (parseInt(parts[1]) / 60);
    }

    let correccion = calcularCorreccion(glucose);
    let carbsNecesarios = calcularCarbsNecesarios(glucose);
    let comida = calcularComida(carbs);
    let ajuste = calcularFPU(fat, protein);
    let IOB = calcularIOB(lastBolus, hoursElapsed);

    let total = correccion - IOB + comida + ajuste;
    if (total < 0) total = 0;
    total = roundHalf(total);

    let warning = "";

    if (glucose < 70) {
        warning = "⚠️ Glucosa baja. Consumir aprox. " + 
        Math.round(carbsNecesarios) + 
        " g antes de aplicar insulina.";
    }

    if (glucose > 250) {
        warning = "⚠️ Glucosa alta. Considerar medir cetonas.";
    }

    document.getElementById("results").innerHTML = `
        Corrección: ${roundHalf(correccion)} u<br>
        Comida: ${roundHalf(comida)} u<br>
        Ajuste grasa/proteína: ${roundHalf(ajuste)} u<br>
        IOB estimada: ${roundHalf(IOB)} u<br><br>
        <strong>Total sugerido: ${total} u 💉</strong>
        <div class="warning">${warning}</div>
    `;
}
</script>

</body>
</html>
